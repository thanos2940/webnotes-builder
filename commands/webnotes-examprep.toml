description = "Build or enhance the exam_prep.html page from past exams / assignments / exercises."

prompt = """
Build (or enhance) the exam-preparation page for this course.

Steps:

1. Read the spec first:
   - skills/webnotes-builder/references/11-exam-prep.md  (the full page spec — MANDATORY)
   - skills/webnotes-builder/references/08-fidelity.md   (fidelity rules apply to exam material too)
   - skills/webnotes-builder/references/03-design-system.md and 04-html-components.md as needed

2. Discover exam-related material in the workspace:
   - Past exams: `exams/`, `exam material/`, `past-papers/`, loose photos (*.jpg/*.png) or PDFs of exam papers
   - Assignments: `assignments/`, `homework/`, `projects/` (read the student's implementations to
     extract PATTERNS — never to quote or reference their specific code/file names)
   - Exercise collections (*.txt, *.md problem sets)
   - If photos: read them carefully; reconstruct unreadable parts as PATTERNS, never fake verbatim quotes.

3. Group the past exam questions into EXERCISE FAMILIES (what each question tests).
   Write `_build/examprep_outline.md` (families, theory questions, drills, bridge ideas)
   and `_build/examprep_fidelity.md` (checklist per 11-exam-prep.md §11).
   Show the family list to the user and confirm before writing HTML.

4. Write `exam_prep.html` per 11-exam-prep.md §3-§7:
   - format / theory-flash / one solved section per family (statement → full solution →
     graded points → variant) / trace drills / assignments bridge
   - TWO GOLDEN RULES: no dated/attributed exam references ("έπεσε το 2025" ❌) and
     no references to the student's specific implementation or file names ❌ —
     generic exercises, patterns, and your own annotated sample code only.

5. Add `"examprep"` quiz data to `data/questions.js` (one sub-key per section with a
   .section-quiz placeholder, 3-5 questions each).

6. Add 🎯 Exam Focus boxes to the mapped chapter sections (immediately before each
   section's .section-quiz div), max ~2 per chapter, each linking to an exam_prep.html anchor.

7. Wire navigation: nav.js entry (before Interactive Quiz) + orange hub card in index.html.

8. Verify: open in browser if possible — quizzes render, drills toggle, links resolve,
   no console warnings; then grep the output for years/semester names/assignment file
   names to enforce the golden rules.

9. Update `_build/STATE.md`: mark the Exam Prep phase, note coverage stats
   ("X theory pairs, Y families solved, Z drills"), set next action.
"""
