description = "Kick off the webnotes build — discover source material and propose a chapter plan."

prompt = """
You are starting a NEW webnotes build for this course directory.

Steps:

1. Read the skill specification fully:
   - skills/webnotes-builder/SKILL.md
   - skills/webnotes-builder/references/01-workflow.md  (overall flow)
   - skills/webnotes-builder/references/08-fidelity.md  (content fidelity)
   - skills/webnotes-builder/references/09-chunked-execution.md  (multi-session workflow)

2. Run the Discovery phase (Phase 1 in 01-workflow.md):
   - Glob the workspace for *.pdf, *.md, *.docx, *.tex
   - Open the first 2-3 pages of each PDF to identify its subject
   - Detect the language used in the slides
   - Detect the subject domain (CS / math / algorithms / logic / networking / etc.)
   - Detect EXAM MATERIAL: exams/, past-papers/, assignments/, exercise files —
     these feed the exam_prep.html page (references/11-exam-prep.md)
   - Detect an EXISTING webnotes site (topic*.html, index.html, styles/, data/questions.js).
     If found, this is an ENHANCE run, not a greenfield build: audit the existing pages
     against the skill's standard (components, depth, per-section quizzes, exam prep,
     responsive CSS) and propose an upgrade plan instead of a from-scratch plan.

3. Propose a plan:
   - CREATE mode: one chapter per source file (or split very large files), suggested slug
     (lowercase, no spaces), estimated section count based on page count, recommended
     color theme — plus an Exam Prep phase if exam material was found
   - ENHANCE mode: per-page gap list (missing sections vs source, missing quizzes,
     missing exam prep, styling drift) ordered by impact

4. ASK THE USER to confirm:
   - The plan (chapter plan or upgrade plan)
   - Preferred language for explanations (match source by default)
   - Depth: terse / standard / encyclopedic
   - Any topics to emphasize or de-emphasize

5. Wait for the user's confirmation. Do NOT scaffold yet.

After confirmation, the user will say `/webnotes-resume` or scaffolding will proceed.
"""
